<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BJC Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    overflow: hidden;
}

#container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    width: 100%;
    height: 100%;
    background: black;
    object-fit: contain;
}

#loading {
    position: absolute;
    color: white;
    font-size: 16px;
    text-align: center;
}

#controls {
    position: absolute;
    bottom: 15px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 15px;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 14px;
}

button:active {
    background: rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div id="container">

    <video id="video" controls playsinline></video>

    <div id="loading">Loading video...</div>

    <div id="controls">
        <button onclick="playVideo()">▶ Play</button>
        <button onclick="toggleFS()">⛶ Fullscreen</button>
        <button onclick="goBack()">⬅ Back</button>
    </div>

</div>

<script>
const video = document.getElementById("video");
const loading = document.getElementById("loading");

function getVideoUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("file");
}

function init() {
    let url = getVideoUrl();

    if (!url) {
        loading.innerHTML = "No video found!";
        return;
    }

    try {
        url = decodeURIComponent(url);

        video.src = url;
        video.load();

        // autoplay attempt
        video.play().then(() => {
            loading.style.display = "none";
        }).catch(() => {
            loading.innerHTML = "Tap Play to start video";
        });

        video.oncanplay = () => {
            loading.style.display = "none";
        };

        video.onerror = () => {
            loading.innerHTML = "Video cannot be played";
        };

    } catch (e) {
        loading.innerHTML = "Invalid video link";
    }
}

function playVideo() {
    video.play();
}

function toggleFS() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

function goBack() {
    window.history.back();
}

init();
</script>

</body>
</html>
