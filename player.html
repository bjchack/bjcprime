<!DOCTYPE html>
<html>
<head>
  <title>Player</title>
</head>
<body style="margin:0;background:black;">

<video id="video" controls autoplay style="width:100%;height:100vh;"></video>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const file = urlParams.get("file");

  const video = document.getElementById("video");

  if (file) {
    video.src = decodeURIComponent(file);
  } else {
    document.body.innerHTML = "NO VIDEO FILE";
  }
</script>

</body>
</html>
